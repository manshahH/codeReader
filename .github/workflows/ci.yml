name: CI

on:
  push:
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -e backend
      - run: ruff check backend

  pytest:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: codereader
          POSTGRES_PASSWORD: codereader
          POSTGRES_DB: codereader
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U codereader -d codereader"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgresql://codereader:codereader@localhost:5432/codereader
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: test-jwt-secret
      GITHUB_CLIENT_SECRET: test-github-client-secret
      TOKEN_ENC_KEY: test-token-encryption-key-32b
      ANTHROPIC_API_KEY: test-anthropic-key
      # HEALTHZ_TEST_IN_PROCESS removed (D-146): in-process is now the default
      # healthz path, so CI needs no special-casing to keep test_healthz green.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -e backend
      - run: alembic upgrade head
      - run: alembic downgrade base
      - run: alembic upgrade head
      # D-88: pytest's migrated_db fixture is destructive (DROP SCHEMA
      # CASCADE) and refuses to run against a database that isn't explicitly
      # declared disposable. TEST_DATABASE_URL makes it explicit, in CI
      # config itself, that the suite runs against codereader_test (created
      # on demand by the fixture), never the `codereader` database the
      # alembic steps above exercised -- even though both are thrown away
      # when this job ends, the two checks are testing different things
      # (migration-chain reversibility vs. application behavior) and should
      # not share a database by coincidence.
      - run: pytest backend/tests
        env:
          TEST_DATABASE_URL: postgresql://codereader:codereader@localhost:5432/codereader_test

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -e backend pip-audit
      # pip-audit has no native severity filter (unlike npm audit below), so
      # this fails on ANY known advisory in the resolved backend
      # dependency set -- a stricter bar than "high severity only", chosen
      # over silently ignoring lower-severity findings. --strict also fails
      # on advisories pip-audit can't fully resolve rather than skipping
      # them quietly.
      # D-128: `pip-audit --strict` against the ENVIRONMENT could never pass.
      # `pip install -e backend` puts our own editable `codereader-backend` in
      # the env; pip-audit cannot look it up on PyPI, and --strict turns
      # "could not audit" into a failure. --skip-editable does not help either,
      # because --strict also fails on skips. So this job has been red since it
      # was written and has never once audited a live advisory feed (which
      # HANDOFF had already noticed as a symptom without the cause).
      # Auditing the RESOLVED dependency set from a freeze, minus the editable
      # package, keeps --strict meaningful: it still fails on any advisory and
      # on any advisory it cannot fully resolve.
      - run: python -m pip freeze --exclude-editable > /tmp/resolved-requirements.txt
      - run: pip-audit --strict -r /tmp/resolved-requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - working-directory: frontend
        run: npm install
      - working-directory: frontend
        run: npm audit --audit-level=high

  schema:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: codereader
          POSTGRES_PASSWORD: codereader
          POSTGRES_DB: codereader
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U codereader -d codereader"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgresql://codereader:codereader@localhost:5432/codereader
      PGPASSWORD: codereader
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f db/schema.sql

  playwright:
    # D-128: the e2e suite had NO CI job at all, which is the direct cause of
    # the D-103 decay -- a cited Playwright spec started failing intermittently
    # (D-122's session-build race) and nothing surfaced it, so a decision entry
    # kept reading as "verified by a passing test" while that test was failing
    # 11 runs in 15. Auditing catches entries that were never true; only this
    # catches entries that STOP being true.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: codereader
          POSTGRES_PASSWORD: codereader
          POSTGRES_DB: codereader
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U codereader -d codereader"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgresql://codereader:codereader@localhost:5432/codereader
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: test-jwt-secret
      GITHUB_CLIENT_SECRET: test-github-client-secret
      TOKEN_ENC_KEY: test-token-encryption-key-32b
      ANTHROPIC_API_KEY: test-anthropic-key
      APP_ORIGIN: http://localhost:5173
      # The suite must never send mail or sample a summarize exercise.
      EMAIL_SENDING_ENABLED: 'false'
      SUMMARIZE_ENABLED: 'false'
      JOBS_ENABLED: 'false'
      # seed_e2e.py writes gate-bypassing content and refuses without this.
      CODEREADER_ALLOW_SEED: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: python -m pip install -e backend
      - run: alembic upgrade head
      # Content: the seeded specs need live exercises to build a session from.
      # seed_e2e.py inserts one of each type; summarize is excluded from
      # sampling by SUMMARIZE_ENABLED above (D-123), leaving three.
      - run: python backend/scripts/seed_e2e.py
      - name: Start the API
        run: |
          # nohup + disown so the server survives this step ending; a bare `&`
          # can take SIGHUP when the step's shell exits.
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8000             > /tmp/uvicorn.log 2>&1 &
          disown || true
          up=0
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/healthz > /dev/null; then up=1; break; fi
            sleep 2
          done
          if [ "$up" != "1" ]; then
            echo "API never became healthy; uvicorn log:"; cat /tmp/uvicorn.log; exit 1
          fi
          echo "api up"
      - name: API log on failure
        if: failure()
        run: cat /tmp/uvicorn.log || true
      - working-directory: frontend
        run: npm install
      - working-directory: frontend
        run: npx playwright install --with-deps chromium
      # Playwright starts and owns its own vite dev server (see
      # playwright.config.ts): reuseExistingServer is false so the suite can
      # never test stale bytes.
      - working-directory: frontend
        run: npx playwright test
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/test-results
          retention-days: 7
